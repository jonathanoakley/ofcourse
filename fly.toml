# fly.toml — ofCourse
# Run `fly launch` once to create the app, then `fly deploy` for updates.
# Change the app name below to whatever fly launch assigns (or pick your own).

app = "ofcourse"
primary_region = "lhr"

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[http_service.checks]]
  grace_period = "5s"
  interval = "15s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "2s"
